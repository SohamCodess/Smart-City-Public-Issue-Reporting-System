<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login | CityFix</title>
<style>
body{
  margin:0;
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f4f6f8;
}
.container{
  width:400px;
  margin:120px auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 6px 16px rgba(0,0,0,0.15);
}
h2{
  text-align:center;
  color:#1f3c88;
}
input{
  width:100%;
  padding:10px;
  margin-top:12px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#1f3c88;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
.error{
  color:red;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="container">
  <h2>🔐 Admin Login</h2>

  <form method="POST">
    <input type="text" name="username" placeholder="Admin Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
</div>
</body>
</html>
