<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CityFix | Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">

<style>
.auth-container{
  max-width:420px;
  margin:80px auto;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}
.auth-container h2{text-align:center;color:#0b4da2}
.auth-container input{
  width:100%;padding:12px;margin:10px 0;
  border:1px solid #ccc;border-radius:6px
}
.field{position:relative}
.eye{position:absolute;right:12px;top:40%;cursor:pointer}
button{
  width:100%;padding:12px;background:#0b4da2;
  color:#fff;border:none;border-radius:6px;font-size:16px
}
.switch{text-align:center;margin-top:15px}
.switch a{color:#0b4da2;cursor:pointer}
.forgot{text-align:right;font-size:14px}
.msg{color:green;text-align:center}
.err{color:red;text-align:center}
</style>
</head>

<body>

<!-- SIMPLE NAVBAR FOR LOGIN PAGE -->
<header class="header">
  <div class="logo">🏙️ <span>CityFix</span></div>
  <nav class="navbar">
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('ward') }}">Ward</a>
    <a href="{{ url_for('report_issue') }}">Report Issue</a>
    <a href="{{ url_for('login') }}">Login</a>
  </nav>
</header>

<div class="auth-container">

{% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
{% if err %}<p class="err">{{ err }}</p>{% endif %}

<h2 id="formTitle">Login</h2>

<!-- LOGIN -->
<form method="POST" action="{{ url_for('login') }}" id="loginForm">
  <input name="username" placeholder="Username" required>

  <div class="field">
    <input type="password" name="password" id="loginPass" placeholder="Password" required>
    <span class="eye" onclick="toggle('loginPass')">👁️</span>
  </div>

  <div class="forgot">
    <a href="#">Forgot Password?</a>
  </div>

  <button>Login</button>

  <div class="switch">
    New user? <a onclick="showRegister()">Register here</a>
  </div>
</form>

<!-- REGISTER -->
<form method="POST" action="{{ url_for('register') }}" id="registerForm" style="display:none">
  <input name="email" placeholder="Email" type="email" required>
  <input name="username" placeholder="Username" required>

  <div class="field">
    <input type="password" name="password" id="regPass" placeholder="Password" required>
    <span class="eye" onclick="toggle('regPass')">👁️</span>
  </div>

  <button>Register</button>

  <div class="switch">
    Already registered? <a onclick="showLogin()">Login</a>
  </div>
</form>

</div>

<script>
function toggle(id){
  const f=document.getElementById(id);
  f.type = f.type==="password" ? "text" : "password";
}
function showRegister(){
  loginForm.style.display="none";
  registerForm.style.display="block";
  formTitle.innerText="Register";
}
function showLogin(){
  registerForm.style.display="none";
  loginForm.style.display="block";
  formTitle.innerText="Login";
}
</script>

</body>
</html>
